services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cauldron
      POSTGRES_PASSWORD: cauldron
      POSTGRES_DB: cauldron
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cauldron']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cauldron
      POSTGRES_PASSWORD: cauldron
      POSTGRES_DB: cauldron_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cauldron']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-e2e:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cauldron
      POSTGRES_PASSWORD: cauldron
      POSTGRES_DB: cauldron_e2e
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cauldron']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    command: 'inngest dev -u http://host.docker.internal:3001/api/inngest -u http://host.docker.internal:3000/api/inngest'
    ports:
      - '8288:8288'
      - '8289:8289'
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - INNGEST_DEV=1

  comfyui:
    image: yanwk/comfyui-boot:latest
    ports:
      - '8188:8188'
    volumes:
      - comfyui_data:/root
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CLI_ARGS=--listen 0.0.0.0
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8188/system_stats']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  postgres_data:
  comfyui_data:
